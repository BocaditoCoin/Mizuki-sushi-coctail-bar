<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mizuki – Carta / Menu / Carte / Menukaart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8d5a0;
      --dark: #0a0a0a;
      --dark-mid: #141414;
      --dark-card: #1a1a1a;
      --text: #f0ead8;
      --text-muted: #8a7a5a;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow-x: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(201,168,76,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      gap: 0;
    }

    /* Decorative top line */
    .deco-line {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--gold));
      margin-bottom: 32px;
      animation: fadeDown 1s ease forwards;
      opacity: 0;
    }

    .header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeUp 0.9s ease 0.1s forwards;
      opacity: 0;
    }

    .header .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .header h1 {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: clamp(2rem, 5vw, 3.4rem);
      letter-spacing: 0.12em;
      color: var(--text);
      line-height: 1.1;
    }

    .header h1 span {
      color: var(--gold);
    }

    .header .subtitle {
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--text-muted);
      margin-top: 12px;
      letter-spacing: 0.05em;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 56px;
      animation: fadeUp 0.9s ease 0.2s forwards;
      opacity: 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      max-width: 120px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .divider::after {
      background: linear-gradient(to left, transparent, var(--gold));
    }
    .divider-diamond {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    /* Flags grid */
    .flags-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      max-width: 680px;
      width: 100%;
    }

    .flag-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 36px 24px 28px;
      background: var(--dark-card);
      border: 1px solid rgba(201,168,76,0.15);
      text-decoration: none;
      color: var(--text);
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.35s ease, transform 0.35s ease;
      animation: fadeUp 0.9s ease var(--delay) forwards;
      opacity: 0;
    }

    .flag-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.07), transparent 70%);
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .flag-card:hover::before { opacity: 1; }
    .flag-card:hover {
      border-color: rgba(201,168,76,0.5);
      transform: translateY(-4px);
    }

    .flag-card.disabled {
      cursor: default;
      pointer-events: none;
      opacity: 0.45;
    }

    .flag-emoji {
      font-size: 56px;
      line-height: 1;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5));
      transition: transform 0.3s ease;
    }

    .flag-card:hover .flag-emoji {
      transform: scale(1.08);
    }

    .flag-label {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-light);
    }

    .flag-sublabel {
      font-style: italic;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: -10px;
    }

    .flag-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.15em;
      padding: 3px 7px;
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold);
      text-transform: uppercase;
    }

    .coming-badge {
      border-color: rgba(138,122,90,0.3);
      color: var(--text-muted);
    }

    /* Footer */
    .footer {
      margin-top: 64px;
      text-align: center;
      animation: fadeUp 0.9s ease 0.7s forwards;
      opacity: 0;
    }

    .footer p {
      font-style: italic;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }

    .deco-line-bottom {
      width: 1px;
      height: 48px;
      background: linear-gradient(to top, transparent, var(--gold));
      margin: 24px auto 0;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .flags-grid {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .flag-card {
        padding: 28px 16px 22px;
      }
      .flag-emoji { font-size: 44px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="deco-line"></div>

    <header class="header">
      <p class="eyebrow">Mizuki Sushi &amp; Cocktail</p>
      <h1>Selecciona tu <span>idioma</span></h1>
      <p class="subtitle">Select your language / Choisissez votre langue / Kies uw taal</p>
    </header>

    <div class="divider"><div class="divider-diamond"></div></div>

    <div class="flags-grid">

      <!-- ESPAÑOL — PDF activo -->
      <a class="flag-card"
         style="--delay: 0.3s"
         href="https://TU-SERVIDOR.COM/ruta/bebidad%20y%20comida%20terminado.pdf"
         target="_blank"
         rel="noopener">
        <span class="flag-badge">Español</span>
        <span class="flag-emoji">🇪🇸</span>
        <span class="flag-label">Español</span>
        <span class="flag-sublabel">Ver carta</span>
      </a>

      <!-- ENGLISH — próximamente -->
      <div class="flag-card disabled" style="--delay: 0.4s">
        <span class="flag-badge coming-badge">Soon</span>
        <span class="flag-emoji">🇬🇧</span>
        <span class="flag-label">English</span>
        <span class="flag-sublabel">Coming soon</span>
      </div>

      <!-- FRANÇAIS — próximamente -->
      <div class="flag-card disabled" style="--delay: 0.5s">
        <span class="flag-badge coming-badge">Bientôt</span>
        <span class="flag-emoji">🇫🇷</span>
        <span class="flag-label">Français</span>
        <span class="flag-sublabel">Bientôt disponible</span>
      </div>

      <!-- NEDERLANDS — próximamente -->
      <div class="flag-card disabled" style="--delay: 0.6s">
        <span class="flag-badge coming-badge">Binnenkort</span>
        <span class="flag-emoji">🇳🇱</span>
        <span class="flag-label">Nederlands</span>
        <span class="flag-sublabel">Binnenkort beschikbaar</span>
      </div>

    </div>

    <footer class="footer">
      <p>© 2025 Mizuki Sushi &amp; Cocktail</p>
      <div class="deco-line-bottom"></div>
    </footer>
  </div>
</body>
</html>
