<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram – Mizuki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ig-from: #f09433; --ig-via: #e6683c; --ig-to: #bc1888;
      --dark: #0a0a0a; --text: #f0ead8; --text-muted: #8a7a5a;
    }
    html, body { height: 100%; background: var(--dark); color: var(--text); font-family: 'Cormorant Garamond', Georgia, serif; }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(188,24,136,0.08), transparent 70%);
      pointer-events: none;
    }
    .page {
      position: relative; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; text-align: center;
    }
    .logo { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.4em; color: #c9a84c; text-transform: uppercase; margin-bottom: 28px; animation: fadeUp 0.8s ease forwards; opacity: 0; }
    .ig-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--ig-from), var(--ig-via), var(--ig-to));
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 32px;
      animation: fadeUp 0.8s ease 0.1s forwards; opacity: 0;
      box-shadow: 0 8px 32px rgba(188,24,136,0.35);
    }
    .ig-icon svg { width: 38px; height: 38px; fill: #fff; }
    h1 { font-family: 'Cinzel', serif; font-weight: 400; font-size: clamp(1.5rem, 4vw, 2.4rem); letter-spacing: 0.1em; line-height: 1.2; margin-bottom: 12px; animation: fadeUp 0.8s ease 0.2s forwards; opacity: 0; }
    .handle {
      font-size: 1.1rem; font-style: italic; color: var(--text-muted);
      margin-bottom: 48px;
      animation: fadeUp 0.8s ease 0.3s forwards; opacity: 0;
    }
    .handle span {
      background: linear-gradient(90deg, var(--ig-from), var(--ig-to));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; font-style: normal; font-weight: 400;
    }
    .spinner-wrap { animation: fadeUp 0.8s ease 0.4s forwards; opacity: 0; }
    .spinner {
      width: 36px; height: 36px; margin: 0 auto 20px;
      border: 2px solid rgba(240, 148, 51, 0.2);
      border-top-color: var(--ig-from);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    .redirect-msg { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.25em; color: var(--text-muted); text-transform: uppercase; }
    .manual-link { margin-top: 32px; font-size: 13px; color: var(--text-muted); animation: fadeUp 0.8s ease 0.6s forwards; opacity: 0; }
    .manual-link a { color: var(--ig-from); text-decoration: none; border-bottom: 1px solid rgba(240,148,51,0.3); }
    .manual-link a:hover { border-bottom-color: var(--ig-from); }
    @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script>
    const IG_URL = "https://www.instagram.com/mizuki_sushi_cocktail/";
    let seconds = 2;
    window.addEventListener('DOMContentLoaded', () => {
      const counter = document.getElementById('counter');
      const tick = setInterval(() => {
        seconds--;
        if (counter) counter.textContent = seconds;
        if (seconds <= 0) {
          clearInterval(tick);
          window.location.href = IG_URL;
        }
      }, 1000);
    });
  </script>
</head>
<body>
  <div class="page">
    <p class="logo">Mizuki Sushi &amp; Cocktail</p>
    <div class="ig-icon">
      <!-- Instagram SVG icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
      </svg>
    </div>
    <h1>Síguenos en Instagram</h1>
    <p class="handle"><span>@mizuki_sushi_cocktail</span></p>
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <p class="redirect-msg">Redirigiendo en <span id="counter">2</span>…</p>
    </div>
    <p class="manual-link">¿No se abre?
      <a href="https://www.instagram.com/mizuki_sushi_cocktail/" target="_blank">Haz clic aquí</a>
    </p>
  </div>
</body>
</html>
